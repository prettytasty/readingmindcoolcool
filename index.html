<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mind Reader</title>
  <style>
    body { font-family: Times New Roman, serif; }
    #app { max-width: 600px; margin: 60px auto; text-align: center; padding: 20px; }
    h1 { font-size: 2em; margin-bottom: 30px; line-height: 1.3; }
    #num-input { font-size: 1.2em; padding: 6px 10px; width: 120px; border: 2px solid #000; margin-bottom: 12px; text-align: center; font-family: inherit; }
    #go-btn { font-size: 1.1em; padding: 8px 20px; cursor: pointer; font-family: inherit; border: 2px solid #000; background: #fff; margin-left: 10px; }
    #go-btn:hover { background: #eee; }
    #progress-wrap { display: none; margin-top: 20px; }
    #bar-outer { width: 100%; height: 28px; border: 2px solid #333; background: #fff; position: relative; }
    #bar-inner { height: 100%; width: 0%; background: #22aa44; transition: width 0.3s linear; }
    #status-msg { margin-top: 10px; font-size: 1.1em; font-style: italic; min-height: 1.5em; }
    #result { margin-top: 30px; font-size: 1.4em; display: none; }
    #explosion { font-size: 3em; display: inline-block; animation: boom 0.6s ease-out forwards; }
    @keyframes boom {
      0% { transform: scale(0.2); opacity: 0; }
      50% { transform: scale(1.6); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    #err { color: red; font-size: 0.95em; margin-top: 6px; min-height: 1.2em; }
  </style>
</head>
<body>
  <div id="app">
    <h1>Pick Any Number You Want<br>I Will Read Your Mind</h1>
    <div>
      <input type="number" id="num-input" placeholder="e.g. 42" />
      <button id="go-btn" onclick="startReading()">Read My Mind</button>
    </div>
    <div id="err"></div>
    <div id="progress-wrap">
      <div id="bar-outer"><div id="bar-inner"></div></div>
      <div id="status-msg">Reading your mind...</div>
    </div>
    <div id="result"></div>
  </div>

  <script>
    var theNumber = null;
    var running = false;

    function startReading() {
      var val = document.getElementById('num-input').value.trim();
      var err = document.getElementById('err');
      if (val === '' || isNaN(val)) {
        err.textContent = 'Please enter a number first!';
        return;
      }
      if (running) return;
      err.textContent = '';
      theNumber = val;
      running = true;
      document.getElementById('result').style.display = 'none';
      document.getElementById('progress-wrap').style.display = 'block';
      document.getElementById('go-btn').disabled = true;
      animateBar();
    }

    function animateBar() {
      var bar = document.getElementById('bar-inner');
      var msg = document.getElementById('status-msg');
      var stages = [
        { pct: 10, text: 'Reading your mind...' },
        { pct: 28, text: 'Analyzing brain patterns...' },
        { pct: 60, text: 'Connecting to your brain via Bluetooth...' },
        { pct: 75, text: 'CALCULATING\n6.37E+893127845151387513 POSSIBLE COMBINATIONS......' },
        { pct: 100, text: 'Done!' }
      ];
      var idx = 0;

      function step() {
        if (idx >= stages.length) {
          finish();
          return;
        }
        var s = stages[idx];
        var current = parseFloat(bar.style.width) || 0;
        var target = s.pct;
        idx++;
        animateTo(current, target, s.text, 900 + idx * 300, step);
      }

      function animateTo(from, to, label, duration, cb) {
        var start = null;
        msg.style.whiteSpace = 'pre-line';
        msg.textContent = label;
        function tick(ts) {
          if (!start) start = ts;
          var prog = Math.min((ts - start) / duration, 1);
          bar.style.width = (from + (to - from) * prog) + '%';
          if (prog < 1) requestAnimationFrame(tick);
          else cb();
        }
        requestAnimationFrame(tick);
      }

      step();
    }

    function finish() {
      var result = document.getElementById('result');
      result.innerHTML = '<div id="explosion">💥🤯🤔</div><br><br>You were thinking of the number <strong>' + theNumber + '</strong>! &nbsp;🤯🤔';
      result.style.display = 'block';
      running = false;
      document.getElementById('go-btn').disabled = false;
    }
  </script>
</body>
</html>
